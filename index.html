<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030308">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Base Reset & Custom Scrollbar (Firefox) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: thin; 
            scrollbar-color: rgba(255, 255, 255, 0.3) rgba(0, 0, 0, 0.1); 
        }

        /* --- Custom Scrollbar (Chrome, Edge, Safari) --- */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1); 
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 10px; 
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5); 
        }

        /* Fix: Separate HTML from Body so they don't double-stack heights */
        html {
            background-color: #030308; /* Fallback color */
        }

        body {
            /* Fix: 100dvh adapts perfectly to mobile address bars hiding/showing */
            min-height: 100vh;
            min-height: 100dvh; 
            font-family: 'Poppins', sans-serif;
            
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('Landing Page Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            overflow-x: hidden; 
            color: #ffffff;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem; /* Slightly reduced padding to keep things centered securely */
        }

        /* --- Welcome Header --- */
        .welcome-text {
            /* clamp() makes the font responsive: min 2.5rem, prefers 8vw, max 4.5rem */
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            letter-spacing: -2px; 
            margin-bottom: 3rem;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            text-align: center;
            
            opacity: 0;
            transform: translateY(-30px);
            animation: dropIn 0.8s ease-out forwards;
        }

        /* --- Main Content (Cards) --- */
        .container {
            display: flex;
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            flex-wrap: wrap; 
            z-index: 10; 
        }

        .card {
            flex: 1 1 240px; 
            max-width: 280px;
            /* Slightly more opaque background to stand out against the image */
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 2.5rem 1.5rem;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, background 0.3s ease, box-shadow 0.3s ease;
            will-change: transform; 
            opacity: 0;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Icon Styling */
        .card i {
            font-size: 2.5rem;
            margin-bottom: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            transition: transform 0.3s ease, color 0.3s ease;
            pointer-events: none; 
        }

        .card:hover i {
            transform: scale(1.15) translateZ(20px); 
            color: #ffffff;
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            pointer-events: none;
        }

        .card p {
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.8;
            line-height: 1.5;
            pointer-events: none; 
        }

        /* --- Sliding Entrance Animations --- */
        @keyframes dropIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Animations for alternating cards */
        .card:nth-child(odd) {
            animation: slideInLeft 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.2s;
        }
        
        .card:nth-child(even) {
            animation: slideInRight 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.4s;
        }
    </style>
</head>
<body>

    <h1 class="welcome-text">Welcome.</h1>

    <div class="container">
        
        <a href="https://alankhoocl.github.io/Upcoming-Trip/" class="card">
            <i class="fa-solid fa-plane-departure"></i>
            <h2>You Must Be Tripping</h2>
            <p>Interactive itinerary visualizer for the next adventure.</p>
        </a>
        
        <a href="howkhooisthis.com" class="card">
            <i class="fa-solid fa-wallet"></i>
            <h2>Split Me The Money</h2>
            <p>Web application for tracking and splitting travel expenses.</p>
        </a>
        
        <a href="https://alankhoocl.github.io/AI-Learning-Management/" class="card">
            <i class="fa-solid fa-brain"></i>
            <h2>A.L.A.N</h2>
            <p>Explorations in data architecture and AI management.</p>
        </a>
        
        <a href="https://alankhoocl.github.io/AI-Job-Matcher/" class="card">
            <i class="fa-solid fa-briefcase"></i>
            <h2>K.H.O.O</h2>
            <p>AI job matching tools and development projects.</p>
        </a>

    </div>

    <script>
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const rotateX = ((y - centerY) / centerY) * -15; 
                const rotateY = ((x - centerX) / centerX) * 15;

                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered successfully');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
    
</body>
</html>
