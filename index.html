<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Universe</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #0B0B1A 0%, #030308 100%);
            overflow: hidden; /* Keeps the shooting star from creating scrollbars */
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Universe Background Elements --- */
        
        /* Subtle Solar System Orbits */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            pointer-events: none;
        }
        .orbit-1 { width: 50vw; height: 50vw; }
        .orbit-2 { width: 75vw; height: 75vw; }
        .orbit-3 { width: 100vw; height: 100vw; }

        /* Starfield Effect (Using a CSS trick with radial gradients) */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 160px 120px, #e0e0e0, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }

        /* Shooting Star Animation */
        .shooting-star {
            position: absolute;
            top: 20%;
            left: -10%;
            width: 150px;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.8));
            transform: rotate(20deg);
            animation: shoot 5s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(20deg); opacity: 1; }
            10% { transform: translate(120vw, 40vh) rotate(20deg); opacity: 0; }
            100% { transform: translate(120vw, 40vh) rotate(20deg); opacity: 0; }
        }

        /* --- Main Content (Cards) --- */
        
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            width: 90%;
            max-width: 1000px;
            z-index: 10; /* Keeps cards above the stars */
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 2.5rem 1.5rem;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, background 0.3s ease, box-shadow 0.3s ease;
            will-change: transform; 
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
        }

        .card p {
            font-size: 0.9rem;
            opacity: 0.6;
            line-height: 1.4;
            pointer-events: none; /* Prevents text from interfering with JS hover math */
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="orbit orbit-1"></div>
    <div class="orbit orbit-2"></div>
    <div class="orbit orbit-3"></div>
    <div class="shooting-star"></div>

    <div class="container">
        
        <a href="https://alankcl.com/" class="card" target="_blank" rel="noopener noreferrer">
            <h2>Upcoming Trip</h2>
            <p>Interactive itinerary visualizer for the next adventure.</p>
        </a>
        
        <a href="https://alankhoocl.github.io/Trip-Split/" class="card" target="_blank" rel="noopener noreferrer">
            <h2>Trip Split Tool</h2>
            <p>Web application for tracking and splitting travel expenses.</p>
        </a>
        
        <a href="https://alankhoocl.github.io/AI-Learning-Management/" class="card" target="_blank" rel="noopener noreferrer">
            <h2>A.L.A.N</h2>
            <p>Explorations in data architecture and AI management.</p>
        </a>
        
        <a href="https://alankhoocl.github.io/AI-Job-Matcher/" class="card" target="_blank" rel="noopener noreferrer">
            <h2>K.H.O.O</h2>
            <p>AI job matching tools and development projects.</p>
        </a>

    </div>

    <script>
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const rotateX = ((y - centerY) / centerY) * -15; 
                const rotateY = ((x - centerX) / centerX) * 15;

                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });
    </script>

</body>
</html>
